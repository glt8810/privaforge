name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel in-flight runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  NODE_VERSION: '22'
  PNPM_VERSION: '9.12.0'

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1 # v6.0.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SKIP_ENV_VALIDATION: '1'
    steps:
      - uses: actions/checkout@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1 # v6.0.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SKIP_ENV_VALIDATION: '1'
    steps:
      - uses: actions/checkout@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1 # v6.0.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  commitlint:
    name: Commit Message Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1 # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: pnpm exec commitlint --from "$PR_BASE_SHA" --to "$PR_HEAD_SHA" --verbose
