name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 06:00 UTC — catches new CVEs even on quiet branches.
    - cron: '0 6 * * *'

permissions:
  contents: read

env:
  PNPM_VERSION: '9.12.0'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL (JavaScript / TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1 # v6.0.2
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality
      - uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          category: '/language:javascript-typescript'

  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1 # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    name: pnpm audit (high+critical)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1 # v6.0.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high --prod
